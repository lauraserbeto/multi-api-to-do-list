<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Multi API TodoList</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="container">

    <h1>Multi API TodoList</h1>

    <!-- Formulário -->
    <div class="card">
        <h2>Nova Tarefa</h2>
        <form id="todoForm">
            <input type="text" id="title" placeholder="Título" required>
            <textarea id="description" placeholder="Descrição"></textarea>
            <button type="submit">Adicionar</button>
        </form>
    </div>

    <!-- Lista -->
    <div class="card">
        <h2>Lista de Tarefas</h2>
        <ul id="todoList"></ul>
    </div>

    <!-- Estatísticas -->
    <div class="card">
        <h2>Estatísticas</h2>
        <p>Total: <span id="total">0</span></p>
        <p>Concluídas: <span id="completed">0</span></p>
    </div>

</div>

<script type="module" src="js/app.js"></script>

</body>
</html>
